services:
  postgres:
    image: postgres:16-alpine
    container_name: fraud-analyzer-postgres
    environment:
      POSTGRES_DB: fraud_analyzer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - fraud_analyzer_data:/var/lib/postgresql/data

volumes:
  fraud_analyzer_data:

