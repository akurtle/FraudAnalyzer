<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fraud Pattern Analyzer</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI", sans-serif;
        background: #f7f1e6;
        color: #203035;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top left, rgba(15, 108, 116, 0.15), transparent 32%),
          linear-gradient(180deg, #f7f1e6, #ebdfcf);
      }

      main {
        max-width: 720px;
        padding: 32px;
        border-radius: 24px;
        background: rgba(255, 250, 242, 0.92);
        border: 1px solid rgba(32, 48, 53, 0.12);
        box-shadow: 0 20px 50px rgba(46, 39, 31, 0.12);
      }

      h1 {
        margin: 0 0 16px;
        font-size: clamp(2rem, 6vw, 3.5rem);
        line-height: 0.96;
      }

      p {
        margin: 0 0 14px;
        line-height: 1.6;
      }

      code {
        padding: 2px 6px;
        border-radius: 8px;
        background: rgba(15, 108, 116, 0.08);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Frontend build required</h1>
      <p>
        The backend is configured to serve the Astro build output from <code>frontend/dist</code>.
      </p>
      <p>
        Run <code>npm install</code> and <code>npm run build</code> inside
        <code>C:\Projects\FraudAnalyzer\frontend</code>, then refresh this page.
      </p>
      <p>
        For local frontend development, run <code>npm run dev</code> from the same directory.
      </p>
    </main>
  </body>
</html>
